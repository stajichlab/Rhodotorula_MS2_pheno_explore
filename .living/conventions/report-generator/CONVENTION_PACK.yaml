---
name: report-generator
version: 0.4.0
core: true
description: >
  Structured LaTeX PDF report generation for computational analyses. Provides a
  phase-based agentic flow (planning brief with audience-tier ladder and
  narrative-vs-structured Results choice; memory consultation; source-of-truth
  manifest fed by analysis-side register_value fragments and enriched with
  framing fields; draft using \SciVal/\SciText wrappers around every
  reportable value; worked-example gate; three blind sub-agent reviewers for
  plain-English, framing, and numerical re-verification; then recompile with a
  scitexlintr drift-check gate and a shape-budget check), three template
  variants (overview, comprehensive, overview+supplement default), section-by-
  section writing guidance, and a provenance/style QC checklist. Not for
  presentations or notebook exports.
author: mycelium
dependencies:
  # External runtime dependency — install when this convention is active.
  # Phase 7 invokes the `scitexlintr` CLI; see analysis-conventions.md.
  - name: scitexlintr
    type: python-package
    install: 'pip install scitexlintr'
tags: [report, latex, pdf, writing, core]
---
